name: Release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v4
      - uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: '9.4.1'
      - run: gradle :app:assembleRelease --no-daemon --stacktrace
      - name: Rename APK
        run: |
          VERSION=$(grep -oP 'versionName = "\K[^"]+' app/build.gradle.kts)
          cd app/build/outputs/apk/release
          for f in *.apk; do mv "$f" "Opsi-${VERSION}.apk"; done
      - uses: actions/upload-artifact@v4
        with:
          name: opsi-release-apk
          path: app/build/outputs/apk/release/*.apk
      - uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: app/build/outputs/apk/release/*.apk

      - name: Set release date to now
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          id=$(gh api "repos/${{ github.repository }}/releases/tags/${{ github.ref_name }}" --jq .id)
          gh api -X PATCH "repos/${{ github.repository }}/releases/$id" -F draft=true >/dev/null
          gh api -X PATCH "repos/${{ github.repository }}/releases/$id" -F draft=false -F make_latest=true >/dev/null
